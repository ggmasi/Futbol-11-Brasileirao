<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="/css/style.css" />
        <script src="/js/routes.js" defer></script>
        <script src="/js/index.js" defer></script>
        <link rel="icon"  href="/imgs/favicon.png">
        <title>Futbol 11 - Brasileirão</title>
    </head>
    <body>
        <div class="header-container"></div>
        <div class="main-container">
            <div class="field-container">
                <div class="attack-container">
                    <div class="CA">
                        <div class="slot">
                            <div class="playerCard">
                                <div class="card_face card_face--front" id="ca">
                                    CA
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="pontas">
                        <div class="slot">
                            <div class="playerCard">
                                <div class="card_face card_face--front" id="pe">
                                    PE
                                </div>
                            </div>
                        </div>
                        <div class="slot">
                            <div class="playerCard">
                                <div class="card_face card_face--front" id="pd">
                                    PD
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mid-container">
                    <div class="MAT">
                        <div class="slot">
                            <div class="playerCard">
                                <div
                                    class="card_face card_face--front"
                                    id="mc_1"
                                >
                                    MC
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="centrais">
                        <div class="slot">
                            <div class="playerCard">
                                <div
                                    class="card_face card_face--front"
                                    id="mc_2"
                                >
                                    MC
                                </div>
                            </div>
                        </div>
                        <div class="slot">
                            <div class="playerCard">
                                <div
                                    class="card_face card_face--front"
                                    id="mc_3"
                                >
                                    MC
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="defense-container">
                    <div class="laterais">
                        <div class="slot">
                            <div class="playerCard">
                                <div class="card_face card_face--front" id="le">
                                    LE
                                </div>
                            </div>
                        </div>
                        <div class="slot">
                            <div class="playerCard">
                                <div class="card_face card_face--front" id="ld">
                                    LD
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="zagueiros">
                        <div class="slot">
                            <div class="playerCard">
                                <div
                                    class="card_face card_face--front"
                                    id="zag_1"
                                >
                                    ZAG
                                </div>
                            </div>
                        </div>
                        <div class="slot">
                            <div class="playerCard">
                                <div
                                    class="card_face card_face--front"
                                    id="zag_2"
                                >
                                    ZAG
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="goleiro-container">
                    <div class="slot">
                        <div class="playerCard">
                            <div class="card_face card_face--front" id="gol">
                                GOL
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- <div class="under-field">
                <div class="random-team">
                    <p id="randomTeam">No team</p>
                </div>
            </div> -->
            <div class="team-container">
                <img src="" id="teamLogo" alt="" width="50" height="50">
                <span class="random-team" id="randomTeam">No team</span>
            </div>
            <div class="player-form">
                <!-- <input
                    class="type-box"
                    type="text"
                    placeholder="Jogador"
                    id="input"
                    name="name"
                    autocomplete="off"
                    autofocus
                /> -->
                
                <div class="input-group">
                    <div class="input-group-prepend">
                        
                    </div>
                    <input
                        type="text"
                        class="type-box"
                        placeholder="Jogador"
                        id="input"
                        name="name"
                        autocomplete="off"
                        autofocus
                        aria-describedby="randomTeam"
                    />
                    <div class="input-group-append">
                        <button class="btn btn-primary" onclick="submitForm()">
                            Enviar
                        </button>
                    </div>
                </div>
            </div>
            <p id="error-msg" class="error"></p>
            <button class="btn btn-danger reset-button" onclick="resetAllData()">Recomeçar</button>
        </div>
    </body>
</html>
